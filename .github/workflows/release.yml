name: Release

# Tag-driven release flow (immutable-releases friendly):
#   1. Tag a full semver: git tag v1.2.3 && git push origin v1.2.3
#   2. This workflow validates, creates the GitHub release for the tag, and
#      force-moves the floating major tag (v1) as a PLAIN git tag — no release
#      attached, per GitHub's immutable-releases guidance for actions.
#   3. Marketplace listing: open the release in the UI and tick
#      "Publish this Action to the GitHub Marketplace" (manual, first time
#      and on each release — there is no API for the marketplace checkbox).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run check

      - name: Ensure committed dist/ matches the tagged source
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ does not match a fresh build of this tag."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Force-move floating major tag (plain tag, no release)
        run: |
          MAJOR=$(echo "$GITHUB_REF_NAME" | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$GITHUB_SHA"
          git push origin "$MAJOR" --force

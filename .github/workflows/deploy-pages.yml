name: Deploy configurator to Pages

# Actions-based Pages deploy of web/dist — nothing committed, cannot touch
# action.yml or the marketplace tarball. Enable Pages (source: GitHub Actions)
# in the repo settings first.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'src/schema/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci
      - run: npm ci --prefix web
      - run: npm run build --prefix web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deployment
        uses: actions/deploy-pages@v4
